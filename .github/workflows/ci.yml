name: CI

on:
  push:
    branches:
      - 'master'
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - 'master'
  schedule:
    - cron: '17 8 * * 0'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          requirements-dev.txt
    - run: pip install -r requirements-dev.txt
    - run: python3 -m pytest --junitxml=test-report.xml
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: Test Results
        path: |
          test-report.xml

  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGENAME: ghcr.io/${{ github.repository }}/zpf-backstage-tv

    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: |
          ${{ env.IMAGENAME }}
        # generate Docker tags based on the following events/attributes
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha

    - name: Set up QEMU
      uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Login to DockerHub
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Determine version string
      run: |
        VERSION=$(git describe --tags --match 'v*' --dirty)
        echo "determined version: $VERSION"
        # simple sanity check
        echo $VERSION | grep "^v"
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Build and push Docker images
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: .
        build-args: |
          VERSION=${{ env.VERSION }}
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ env.IMAGENAME }}:buildcache
        cache-to: type=registry,ref=${{ env.IMAGENAME }}:buildcache,mode=max

  # needed by test results workflow
  event_file:
    name: "Event File"
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
    - name: Upload
      uses: actions/upload-artifact@v7
      with:
        name: Event File
        path: ${{ github.event_path }}
