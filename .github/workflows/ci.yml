name: CI

on:
  push:
    branches:
      - 'master'
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - 'master'
  schedule:
    - cron: '17 8 * * 0'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          requirements-dev.txt
    - run: pip install -r requirements-dev.txt
    - run: python3 -m pytest --junitxml=test-report.xml
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: Test Results
        path: |
          test-report.xml

  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGENAME: ghcr.io/${{ github.repository }}/zpf-backstage-tv

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
      with:
        images: |
          ${{ env.IMAGENAME }}
        # generate Docker tags based on the following events/attributes
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha

    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Login to DockerHub
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Determine version string
      run: |
        VERSION=$(git describe --tags --match 'v*' --dirty)
        echo "determined version: $VERSION"
        # simple sanity check
        echo $VERSION | grep "^v"
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Build and push Docker images
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        build-args: |
          VERSION=${{ env.VERSION }}
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ env.IMAGENAME }}:buildcache
        cache-to: type=registry,ref=${{ env.IMAGENAME }}:buildcache,mode=max

  # needed by test results workflow
  event_file:
    name: "Event File"
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
    - name: Upload
      uses: actions/upload-artifact@v7
      with:
        name: Event File
        path: ${{ github.event_path }}
